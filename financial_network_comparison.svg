<svg width="1000" height="500" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="500" fill="#FCFBF8" />
  
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" />
      <feOffset dx="1.5" dy="1.5" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.15" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <!-- Left Side: Star-like (Scale and Shift) -->
  <g transform="translate(0, 0)">
    <text x="250" y="40" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-weight="bold" font-size="16" fill="#333">(A) Topologi Star-like</text>
    
    <!-- Connection Lines -->
    <g stroke="#D37C64" stroke-width="2.5" opacity="0.8">
      <line x1="250" y1="270" x2="100" y2="270" />
      <line x1="250" y1="270" x2="160" y2="395" />
      <line x1="250" y1="270" x2="340" y2="395" />
      <line x1="250" y1="270" x2="400" y2="270" />
      <line x1="250" y1="270" x2="340" y2="145" />
      <line x1="250" y1="270" x2="160" y2="145" />
    </g>

    <!-- Nodes -->
    <g filter="url(#softShadow)">
      <circle cx="160" cy="145" r="32" fill="#F4F4F1" stroke="#A0A098" stroke-width="1" />
      <text x="160" y="150" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="11" fill="#444">NODE 1</text>
      
      <circle cx="340" cy="145" r="32" fill="#F4F4F1" stroke="#A0A098" stroke-width="1" />
      <text x="340" y="150" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="11" fill="#444">NODE 2</text>
      
      <circle cx="400" cy="270" r="32" fill="#F4F4F1" stroke="#A0A098" stroke-width="1" />
      <text x="400" y="275" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="11" fill="#444">NODE 3</text>
      
      <circle cx="340" cy="395" r="32" fill="#F4F4F1" stroke="#A0A098" stroke-width="1" />
      <text x="340" y="400" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="11" fill="#444">NODE 4</text>
      
      <circle cx="160" cy="395" r="32" fill="#F4F4F1" stroke="#A0A098" stroke-width="1" />
      <text x="160" y="400" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="11" fill="#444">NODE 5</text>
      
      <circle cx="100" cy="270" r="32" fill="#F4F4F1" stroke="#A0A098" stroke-width="1" />
      <text x="100" y="275" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="11" fill="#444">NODE 6</text>
      
      <!-- Central Node -->
      <circle cx="250" cy="270" r="45" fill="#FDEEE9" stroke="#D37C64" stroke-width="2" />
      <text x="250" y="266" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="14" fill="#5C2D1F">NODE 0</text>
      <text x="250" y="282" text-anchor="middle" font-family="sans-serif" font-size="11" font-style="italic" fill="#D37C64">Pusat</text>
    </g>
  </g>

  <!-- Divider Line -->
  <line x1="500" y1="50" x2="500" y2="450" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="5,5" />

  <!-- Right Side: Distributed (Scale and Shift) -->
  <g transform="translate(500, 0)">
    <text x="250" y="40" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-weight="bold" font-size="16" fill="#333">(B) Topologi Distributed</text>
    
    <!-- Connection Lines -->
    <g stroke="#8D8D87" stroke-width="1.5" opacity="0.5">
      <line x1="250" y1="120" x2="410" y2="210" />
      <line x1="410" y1="210" x2="410" y2="370" />
      <line x1="410" y1="370" x2="250" y2="460" />
      <line x1="250" y1="460" x2="90" y2="370" />
      <line x1="90" y1="370" x2="90" y2="210" />
      <line x1="90" y1="210" x2="250" y2="120" />
      <line x1="250" y1="120" x2="250" y2="460" />
      <line x1="90" y1="210" x2="410" y2="370" />
      <line x1="410" y1="210" x2="90" y2="370" />
      <line x1="250" y1="120" x2="410" y2="370" />
      <line x1="90" y1="210" x2="250" y2="460" />
    </g>

    <!-- Nodes -->
    <g filter="url(#softShadow)">
      <circle cx="250" cy="120" r="32" fill="#F4F4F1" stroke="#8D8D87" stroke-width="1" />
      <text x="250" y="125" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="11" fill="#444">NODE 1</text>
      
      <circle cx="410" cy="210" r="32" fill="#F4F4F1" stroke="#8D8D87" stroke-width="1" />
      <text x="410" y="215" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="11" fill="#444">NODE 2</text>
      
      <circle cx="410" cy="370" r="32" fill="#F4F4F1" stroke="#8D8D87" stroke-width="1" />
      <text x="410" y="375" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="11" fill="#444">NODE 3</text>
      
      <circle cx="250" cy="460" r="32" fill="#F4F4F1" stroke="#8D8D87" stroke-width="1" />
      <text x="250" y="465" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="11" fill="#444">NODE 4</text>
      
      <circle cx="90" cy="370" r="32" fill="#F4F4F1" stroke="#8D8D87" stroke-width="1" />
      <text x="90" y="375" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="11" fill="#444">NODE 5</text>
      
      <circle cx="90" cy="210" r="32" fill="#F4F4F1" stroke="#8D8D87" stroke-width="1" />
      <text x="90" y="215" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="11" fill="#444">NODE 6</text>
    </g>
  </g>
</svg>
