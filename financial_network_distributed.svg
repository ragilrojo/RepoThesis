<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="500" height="500" fill="#FCFBF8" />
  
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" />
      <feOffset dx="1.5" dy="1.5" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Connection Lines (Interconnected Mesh) -->
  <g stroke="#A0A098" stroke-width="1.8" opacity="0.6">
    <!-- Outer perimeter connections -->
    <line x1="250" y1="80" x2="410" y2="170" />
    <line x1="410" y1="170" x2="410" y2="330" />
    <line x1="410" y1="330" x2="250" y2="420" />
    <line x1="250" y1="420" x2="90" y2="330" />
    <line x1="90" y1="330" x2="90" y2="170" />
    <line x1="90" y1="170" x2="250" y2="80" />
    
    <!-- Cross connections -->
    <line x1="250" y1="80" x2="250" y2="420" />
    <line x1="90" y1="170" x2="410" y2="330" />
    <line x1="410" y1="170" x2="90" y2="330" />
    <line x1="250" y1="80" x2="410" y2="330" />
    <line x1="90" y1="170" x2="250" y2="420" />
  </g>

  <!-- Nodes (distributed) -->
  <g filter="url(#softShadow)">
    <circle cx="250" cy="80" r="35" fill="#F4F4F1" stroke="#8D8D87" stroke-width="1.2" />
    <text x="250" y="85" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="13" fill="#444440">NODE 1</text>
    
    <circle cx="410" cy="170" r="35" fill="#F4F4F1" stroke="#8D8D87" stroke-width="1.2" />
    <text x="410" y="175" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="13" fill="#444440">NODE 2</text>
    
    <circle cx="410" cy="330" r="35" fill="#F4F4F1" stroke="#8D8D87" stroke-width="1.2" />
    <text x="410" y="335" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="13" fill="#444440">NODE 3</text>
    
    <circle cx="250" cy="420" r="35" fill="#F4F4F1" stroke="#8D8D87" stroke-width="1.2" />
    <text x="250" y="425" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="13" fill="#444440">NODE 4</text>
    
    <circle cx="90" cy="330" r="35" fill="#F4F4F1" stroke="#8D8D87" stroke-width="1.2" />
    <text x="90" y="335" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="13" fill="#444440">NODE 5</text>
    
    <circle cx="90" cy="170" r="35" fill="#F4F4F1" stroke="#8D8D87" stroke-width="1.2" />
    <text x="90" y="175" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="13" fill="#444440">NODE 6</text>
  </g>
</svg>
