<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="500" height="500" fill="#FCFBF8" />
  
  <!-- Definitions for shadows and gradients -->
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" />
      <feOffset dx="1.5" dy="1.5" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Connection Lines (Underneath nodes) -->
  <g stroke="#D37C64" stroke-width="2.5">
    <line x1="250" y1="250" x2="70" y2="250" />   <!-- SOL -->
    <line x1="250" y1="250" x2="140" y2="405" />  <!-- ADA -->
    <line x1="250" y1="250" x2="360" y2="405" />  <!-- DOGE -->
    <line x1="250" y1="250" x2="430" y2="250" />  <!-- XRP -->
    <line x1="250" y1="250" x2="360" y2="95" />   <!-- BNB -->
    <line x1="250" y1="250" x2="140" y2="95" />   <!-- ETH -->
  </g>

  <!-- Peripheral Nodes -->
  <g filter="url(#softShadow)">
    <circle cx="140" cy="95" r="38" fill="#F4F4F1" stroke="#A0A098" stroke-width="1.2" />
    <text x="140" y="100.5" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="600" font-size="14" fill="#444440">NODE 1</text>
    
    <circle cx="360" cy="95" r="38" fill="#F4F4F1" stroke="#A0A098" stroke-width="1.2" />
    <text x="360" y="100.5" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="600" font-size="14" fill="#444440">NODE 2</text>
    
    <circle cx="430" cy="250" r="38" fill="#F4F4F1" stroke="#A0A098" stroke-width="1.2" />
    <text x="430" y="255.5" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="600" font-size="14" fill="#444440">NODE 3</text>
    
    <circle cx="360" cy="405" r="38" fill="#F4F4F1" stroke="#A0A098" stroke-width="1.2" />
    <text x="360" y="410.5" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="600" font-size="14" fill="#444440">NODE 4</text>
    
    <circle cx="140" cy="405" r="38" fill="#F4F4F1" stroke="#A0A098" stroke-width="1.2" />
    <text x="140" y="410.5" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="600" font-size="14" fill="#444440">NODE 5</text>
    
    <circle cx="70" cy="250" r="38" fill="#F4F4F1" stroke="#A0A098" stroke-width="1.2" />
    <text x="70" y="255.5" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="600" font-size="14" fill="#444440">NODE 6</text>
  </g>

  <!-- Center Node (BTC replaced by NODE 0) -->
  <g filter="url(#softShadow)">
    <circle cx="250" cy="250" r="52" fill="#FDEEE9" stroke="#D37C64" stroke-width="2.2" />
    <text x="250" y="246" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="bold" font-size="18" fill="#5C2D1F">NODE 0</text>
    <text x="250" y="266" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-style="italic" fill="#D37C64">Pusat</text>
  </g>
</svg>
